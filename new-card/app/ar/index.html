<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SNAP CARD - WebAR</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
    
    #loading-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #0F172A; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999; color: #FFF;
      transition: opacity 0.5s ease;
    }
    .spinner {
      border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #3B82F6;
      border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    #ui-container {
      position: absolute; left: 0; width: 100%;
      display: none; 
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; pointer-events: none;
    }

    .pos-bottom_center { bottom: 40px; }
    .pos-top_right { top: 40px; right: 20px; align-items: flex-end !important; width: auto !important; }
    .pos-hidden { display: none !important; }

    #incentive-popup {
      background: rgba(15, 23, 42, 0.9); color: #FFF;
      padding: 12px 24px; border-radius: 16px; font-size: 14px; font-weight: bold;
      margin-bottom: 15px; border: 1px solid #3B82F6;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
      text-align: center; backdrop-filter: blur(4px);
    }
    .win-border { border-color: #F59E0B !important; box-shadow: 0 0 25px rgba(245, 158, 11, 0.8) !important; }

    #action-btn {
      background: linear-gradient(135deg, #EC4899 0%, #F43F5E 100%);
      color: white; border: none; padding: 16px 32px; border-radius: 30px; 
      font-size: 16px; font-weight: 900; letter-spacing: 1px;
      box-shadow: 0 10px 25px rgba(236, 72, 153, 0.5);
      cursor: pointer; pointer-events: auto;
      transition: transform 0.2s;
    }
    .win-btn { background: linear-gradient(135deg, #D97706 0%, #F59E0B 100%) !important; box-shadow: 0 10px 25px rgba(245, 158, 11, 0.5) !important; }
    #action-btn:active { transform: scale(0.95); }
    
    /* MindARのスキャンUIを手前に表示 */
    .mindar-ui-overlay { z-index: 50; }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: bold; letter-spacing: 1px;">空間データを同期中...</p>
    <p id="loading-error" style="color:#EF4444; font-size:12px; margin-top:10px; display:none;"></p>
  </div>

  <div id="ui-container">
    <div id="incentive-popup">
      <span id="ar-title">✨ 対象を捕捉しました ✨</span><br>
      <span style="font-size:12px; font-weight:normal; color:#CBD5E1;" id="shop-note">報酬データを受信中...</span>
    </div>
    <button id="action-btn">読み込み中...</button>
  </div>

  <script>
    // 💡 ご自身のSupabase環境情報に書き換えてください
    const SUPABASE_URL = 'YOUR_SUPABASE_URL'; 
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY'; 
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function initAR() {
      const urlParams = new URLSearchParams(window.location.search);
      const shopId = urlParams.get('shop_id') || urlParams.get('id');

      if (!shopId) {
        showError("店舗IDが指定されていません。URLをご確認ください。");
        return;
      }

      try {
        const [promoRes, configRes] = await Promise.all([
          supabase.from('promo_links').select('*').eq('id', shopId).single(),
          supabase.from('system_config').select('config_data').eq('id', 'webar_dynamic_settings').single()
        ]);

        if (promoRes.error || !promoRes.data) throw new Error("店舗データの取得に失敗しました。");
        
        const shopData = promoRes.data;
        const arConfig = configRes.data?.config_data || {};

        if (!shopData.ar_marker_url) {
            throw new Error("この店舗にはマーカーデータ（.mind）が紐付けられていません。");
        }

        const rawWinRate = shopData.win_rate !== undefined && shopData.win_rate !== null ? parseFloat(shopData.win_rate) : 0; 
        const rand = Math.random() * 100;
        const isUserWin = rand < rawWinRate; 

        let selectedAssetUrl = isUserWin ? shopData.ar_win_asset_url : shopData.ar_asset_url;
        if (!selectedAssetUrl) selectedAssetUrl = arConfig.arAssetCustomUrl;
        if (!selectedAssetUrl) throw new Error("表示用のアセットが登録されていません。");

        const actionBtn = document.getElementById('action-btn');
        const uiContainer = document.getElementById('ui-container');
        const incentivePopup = document.getElementById('incentive-popup');
        const arTitle = document.getElementById('ar-title');
        const shopNote = document.getElementById('shop-note');

        uiContainer.classList.add(`pos-${arConfig.arBtnPlacement || 'bottom_center'}`);

        if (isUserWin) {
          arTitle.innerHTML = "🎉 大当たり！限定クーポン解放 🎉";
          arTitle.style.color = "#F59E0B";
          shopNote.innerText = `${shopData.client_name}: 特典を獲得しました！`;
          incentivePopup.classList.add('win-border');
          actionBtn.classList.add('win-btn');
          actionBtn.innerText = shopData.ar_action_text_win || "クーポンと限定カードをGET！";
        } else {
          arTitle.innerText = "✨ 対象をスキャンしました ✨";
          shopNote.innerText = shopData.note && shopData.note !== '場所未設定' ? shopData.note : `${shopData.client_name} 限定カード召喚`;
          actionBtn.innerText = arConfig.arActionText || "アプリでカードをGET!";
        }

        // ==========================================
        // 💡 MindAR用要素の動的生成（innerHTMLを使わずに構築）
        // ==========================================
        const sceneEl = document.createElement('a-scene');
        // uiLoading:no にして、自前のローディング画面を見せます
        sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${shopData.ar_marker_url}; uiLoading:no; uiScanning:yes;`);
        sceneEl.setAttribute('color-space', 'sRGB');
        sceneEl.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights');
        sceneEl.setAttribute('vr-mode-ui', 'enabled: false');
        sceneEl.setAttribute('device-orientation-permission-ui', 'enabled: false');

        const assetsEl = document.createElement('a-assets');
        let entityEl;

        if (selectedAssetUrl.match(/\.(glb|gltf)$/i)) {
            const assetItem = document.createElement('a-asset-item');
            assetItem.setAttribute('id', 'dynamicAsset');
            assetItem.setAttribute('src', selectedAssetUrl);
            assetsEl.appendChild(assetItem);

            entityEl = document.createElement('a-gltf-model');
            entityEl.setAttribute('src', '#dynamicAsset');
            entityEl.setAttribute('position', '0 0 0');
            entityEl.setAttribute('scale', '0.6 0.6 0.6');
            entityEl.setAttribute('animation-mixer', '');
        } else if (selectedAssetUrl.match(/\.(mp4|webm)$/i)) {
            const videoEl = document.createElement('video');
            videoEl.setAttribute('id', 'dynamicAsset');
            videoEl.setAttribute('src', selectedAssetUrl);
            videoEl.setAttribute('autoplay', '');
            videoEl.setAttribute('loop', 'true');
            videoEl.setAttribute('muted', '');
            videoEl.setAttribute('playsinline', '');
            assetsEl.appendChild(videoEl);

            entityEl = document.createElement('a-video');
            entityEl.setAttribute('src', '#dynamicAsset');
            entityEl.setAttribute('width', '1');
            entityEl.setAttribute('height', '0.56');
            entityEl.setAttribute('position', '0 0 0');
        } else {
            const imgEl = document.createElement('img');
            imgEl.setAttribute('id', 'dynamicAsset');
            imgEl.setAttribute('src', selectedAssetUrl);
            imgEl.setAttribute('crossorigin', 'anonymous');
            assetsEl.appendChild(imgEl);

            entityEl = document.createElement('a-image');
            entityEl.setAttribute('src', '#dynamicAsset');
            entityEl.setAttribute('width', '1');
            entityEl.setAttribute('height', '1.4'); // カードの比率
            entityEl.setAttribute('position', '0 0 0');
        }

        sceneEl.appendChild(assetsEl);

        const cameraEl = document.createElement('a-camera');
        cameraEl.setAttribute('position', '0 0 0');
        cameraEl.setAttribute('look-controls', 'enabled: false');
        sceneEl.appendChild(cameraEl);

        const targetEl = document.createElement('a-entity');
        targetEl.setAttribute('mindar-image-target', 'targetIndex: 0');
        targetEl.appendChild(entityEl);
        sceneEl.appendChild(targetEl);

        // BodyにSceneを追加して初期化開始
        document.body.appendChild(sceneEl);

        // ==========================================
        // 💡 イベントリスナーの設定
        // ==========================================
        sceneEl.addEventListener('arReady', () => {
          const loadingScreen = document.getElementById('loading-screen');
          loadingScreen.style.opacity = '0';
          setTimeout(() => loadingScreen.style.display = 'none', 500);
        });

        sceneEl.addEventListener('arError', () => {
          showError("ARの起動に失敗しました。ブラウザのカメラアクセスを許可してください。");
        });

        targetEl.addEventListener('targetFound', () => { 
            uiContainer.style.display = 'flex'; 
        });
        targetEl.addEventListener('targetLost', () => { 
            uiContainer.style.display = 'none'; 
        });

        // 💡 アプリ側で設定した useARRewardHandler に合わせたディープリンク！
        actionBtn.addEventListener('click', () => {
          actionBtn.innerText = "データ同期中...";
          
          window.location.href = `snapcard://ar-reward?promo_id=${shopId}&is_win=${isUserWin}`;
          
          // フォールバック (アプリが入っていない場合はストアやLPに飛ばす)
          setTimeout(() => {
             window.location.href = `https://snapcard.example.com/#download`;
          }, 2500);
        });

      } catch (err) {
        showError(err.message);
      }
    }

    // エラー表示用関数
    function showError(message) {
        const errorEl = document.getElementById('loading-error');
        errorEl.innerText = message;
        errorEl.style.display = 'block';
        document.querySelector('.spinner').style.display = 'none';
        document.querySelector('#loading-screen p:first-of-type').innerText = "エラーが発生しました";
    }

    // DOM読み込み後に実行
    document.addEventListener("DOMContentLoaded", initAR);
  </script>
</body>
</html>
